<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSC 225 Lab 4 - Ordering Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 70%;
      max-width: 800px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(0,0,0,0.15);
    }

    h1 {
      color: #333;
      text-align: center;
    }

    h2 {
      color: #444;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
    }

    .info {
      margin-top: 25px;
      padding: 20px;
      background-color: #f9f9f9;
      border-left: 5px solid #0077cc;
      border-radius: 5px;
    }

    .label {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to Our Store</h1>
    <h2 id="greeting"></h2>

    <div class="info">
      <p><span class="label">Customer Name:</span> <span id="customerName"></span></p>
      <p><span class="label">Item Requested:</span> <span id="itemRequested"></span></p>
      <p><span class="label">Number of Items:</span> <span id="numberOfItems"></span></p>
      <p><span class="label">Expected Arrival Date:</span> <span id="arrivalDate"></span></p>
    </div>
  </div>

  <script>
    alert("Welcome to our store!");

    let customerName = prompt("Please enter your name:");
    let itemRequested = prompt("What item would you like to order?");
    let numberOfItems = parseInt(prompt("How many would you like to order? (1-99)"));

    while (isNaN(numberOfItems) || numberOfItems < 1 || numberOfItems > 99) {
      numberOfItems = parseInt(prompt("Invalid amount. Please enter a number between 1 and 99:"));
    }

    let currentHour = new Date().getHours();
    let greetingMessage = "";

    if (currentHour < 12) {
      greetingMessage = "Good Morning " + customerName + ", Thank you for Ordering!";
    } else if (currentHour < 18) {
      greetingMessage = "Good Afternoon " + customerName + ", Thank you for Ordering!";
    } else {
      greetingMessage = "Good Evening " + customerName + ", Thank you for Ordering!";
    }

    let today = new Date();
    let arrival = new Date();
    arrival.setDate(today.getDate() + 7);

    let formattedArrival = arrival.toDateString();

    document.getElementById("greeting").textContent = greetingMessage;
    document.getElementById("customerName").textContent = customerName;
    document.getElementById("itemRequested").textContent = itemRequested;
    document.getElementById("numberOfItems").textContent = numberOfItems;
    document.getElementById("arrivalDate").textContent = formattedArrival;
  </script>
</body>
</html>
